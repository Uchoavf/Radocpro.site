  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

-height:1.7;\n  }\n\n  /* page layout */\n  .page{ max-width:860px; margin:0 auto; padding:72px 48px 120px; }\n\n  /* hero */\n  .hero-head{\n    text-align:center; padding:64px 0 72px;\n    border-bottom:1px solid rgba(189,151,72,0.3);\n    margin-bottom:64px;\n  }\n  .hero-head .kicker{\n    font-size:12px; font-weight:700; letter-spacing:0.44em; text-transform:uppercase;\n    color:var(--gold); margin-bottom:16px;\n  }\n  .hero-head h1{\n    font-family:\"Cormorant Garamond\",serif; font-weight:600; font-size:56px; color:var(--green);\n  }\n  .hero-head h1 .pro{ color:var(--gold); }\n  .hero-head p{ margin-top:14px; font-size:16px; color:#6b6357; max-width:520px; margin-left:auto; margin-right:auto; }\n\n  /* sections */\n  section{ margin-bottom:56px; }\n  section + section{ padding-top:56px; border-top:1px solid rgba(189,151,72,0.2); }\n\n  .section-num{\n    font-family:\"JetBrains Mono\",monospace; font-size:12px; color:var(--gold);\n    letter-spacing:0.1em; margin-bottom:8px;\n  }\n  h2{\n    font-family:\"Cormorant Garamond\",serif; font-weight:600; font-size:38px; color:var(--green);\n    margin-bottom:24px; line-height:1.1;\n  }\n  h3{\n    font-family:\"Hanken Grotesk\",sans-serif; font-weight:700; font-size:15px;\n    letter-spacing:0.08em; text-transform:uppercase; color:var(--green);\n    margin:32px 0 14px;\n  }\n  p{ font-size:16px; margin-bottom:14px; color:#3a4a42; }\n  p:last-child{ margin-bottom:0; }\n  strong{ font-weight:700; color:var(--ink); }\n  em{ font-style:italic; color:var(--green); }\n\n  /* tables */\n  .tbl-wrap{ overflow-x:auto; margin:20px 0; border-radius:12px; box-shadow:0 2px 8px rgba(0,0,0,0.06); }\n  table{ width:100%; border-collapse:collapse; background:var(--cream); font-size:14px; }\n  thead th{\n    background:var(--green); color:var(--cream); padding:12px 16px;\n    text-align:left; font-weight:700; letter-spacing:0.04em;\n    font-family:\"Hanken Grotesk\",sans-serif;\n  }\n  thead th:first-child{ border-radius:12px 0 -box{\n    width:90px; height:90px; border-radius:22px;\n    display:flex; align-items:center; justify-content:center;\n    box-shadow:0 8px 20px rgba(20,60,45,0.18);\n  }\n  .demo-chip .glyph{\n    font-family:\"Cormorant Garamond\",serif; font-weight:600; font-size:50px; line-height:1;\n  }\n  .demo-chip .label{ font-size:12px; color:#6b6357; font-weight:600; }\n\n  /* prompt box */\n  .prompt-box{\n    background:var(--green); border-radius:16px; padding:32px 36px; margin:24px 0;\n  }\n  .prompt-box .prompt-label{\n    font-size:11px; font-weight:700; letter-spacing:0.32em; text-transform:uppercase;\n    color:var(--gold-soft); margin-bottom:14px;\n  }\n  .prompt-box p{ color:rgba(247,243,234,0.88); font-size:15px; }\n  .prompt-box strong{ color:var(--cream); }\n  .prompt-box code{ background:rgba(247,243,234,0.12); color:var(--gold-soft); }\n\n  /* footer */\n  .doc-footer{\n    text-align:center; padding-top:48px; border-top:1px solid rgba(189,151,72,0.3);\n    margin-top:80px;\n  }\n  .doc-footer .rp{\n    font-family:\"Cormorant Garamond\",serif; font-weight:600; font-size:36px; color:var(--green);\n  }\n  .doc-footer .rp span{ color:var(--gold); }\n  .doc-footer p{ margin-top:8px; font-size:13px; color:#8a8071; }\n<\u002Fstyle>\n\n\n\n<\u002Fhead>\n<body>\n<div class=\"page\">\n\n  <div class=\"hero-head\">\n    <div class=\"kicker\">Identidade Visual · Guia Completo<\u002Fdiv>\n    <h1>radoc<span class=\"pro\">.pro<\u002Fspan><\u002Fh1>\n    <p>Especificações técnicas para replicar todas as peças visuais no Claude chat.<\u002Fp>\n  <\u002Fdiv>\n\n  <!-- 1. Contexto -->\n  <section>\n    <div class=\"section-num\">01<\u002Fdiv>\n    <h2>Contexto do projeto<\u002Fh2>\n    <p><strong>Serviço:<\u002Fstrong> Assessoria para montagem de RADOC (Relatório de Atividades Docentes) para professores da UFRA — Universidade Federal Rural da Amazônia.<\u002Fp>\n    <p><strong>Marca:<\u002Fstrong> <code>radoc.pro<\u002Fcode> — o domínio <code>.pro<\u002Fcode> reforça especialização e profissionalismo.<\u002Fp>\n    <p><strong>Público-alvo:<\u002Fstrong> Docentes da UFRA que precisam montar o relatório para progressão funcional (avaliado pela CPPD).<\u002Fp>\n    <p><strong>Estilo:<\u002Fstrong> Minimalista e elegante, com vocabulário visual acadêmico/institucional — moldura de certificado, tipografia serifada, paleta institucional.<\u002Fp>\n\n    <h3>Peças produzidas<\u002Fh3>\n    <div class=\"tbl-wrap\">\n      <table>\n        <thead><tr><th>#<\u002Fth><th>Peça<\u002Fth><th>Formato<\u002Fth><\u002Ftr><\u002Fthead>\n        <tbody>\n          <tr><td>1<\u002Ftd><td>Story de anúncio (WhatsApp Status)<\u002Ftd><td>1080 × 1920 px<\u002Ftd><\u002Ftr>\n          <tr><td>2<\u002Ftd><td>Logomarca — 3 direções<\u002Ftd><td>HTML showcase<\u002Ftd><\u002Ftr>\n          <tr><td>3<\u002Ftd><td>Foto de perfil WhatsApp<\u002Ftd><td>800 × 800 px<\u002Ftd><\u002Ftr>\n        <\u002Ftbody>\n      <\u002Ftable>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 2. Design System -->\n  <section>\n    <div class=\"section-num\">02<\u002Fdiv>\n    <h2>Sistema de Design<\u002Fh2>\n\n    <h3>Paleta de cores<\u002Fh3>\n    <div class=\"swatches\">\n      <div class=\"swatch\"><div class=\"chip\" style=\"background:#1c5640\"><\u002Fdiv><div class=\"info\"><div class=\"name\">Green<\u002Fdiv><div class=\"hex\">#1c5640 · principal<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n      <div class=\"swatch\"><div class=\"chip\" style=\"background:#143c2d\"><\u002Fdiv><div class=\"info\"><div class=\"name\">Green Deep<\u002Fdiv><div class=\"hex\">#143c2d · sombras<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n      <div class=\"swatch\"><div class=\"chip\" style=\"background:#bd9748\"><\u002Fdiv><div class=\"info\"><div class=\"name\">Gold<\u002Fdiv><div class=\"hex\">#bd9748 · acentos<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n      <div class=\"swatch\"><div class=\"chip\" style=\"background:#d8bd86\"><\u002Fdiv><div class=\"info\"><div class=\"name\">Gold Soft<\u002Fdiv><div class=\"hex\">#d8bd86 · monograma p<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n      <div class=\"swatch\"><div class=\"chip\" style=\"background:#a8392e\"><\u002Fdiv><div class=\"info\"><div class=\"name\">Red<\u002Fdiv><div class=\"hex\">#a8392e · separador ·<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n      <div class=\"swatch\"><div class=\"chip\" style=\"background:#f7f3ea;border:1px solid #ddd\"><\u002Fdiv><div class=\"info\"><div class=\"name\">Cream<\u002Fdiv><div class=\"hex\">#f7f3ea · fundo<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n      <div class=\"swatch\"><div class=\"chip\" style=\"background:#efe8d8;border:1px solid #ddd\"><\u002Fdiv><div class=\"info\"><div class=\"name\">Cream 2<\u002Fdiv><div class=\"hex\">#efe8d8 · gradiente<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n      <div class=\"swatch\"><div class=\"chip\" style=\"background:#22312a\"><\u002Fdiv><div class=\"info\"><div class=\"name\">Ink<\u002Fdiv><div class=\"hex\">#22312a · corpo<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n\n    <h3>Tipografia<\u002Fh3>\n    <div class=\"tbl-wrap\">\n      <table>\n        <thead><tr><th>Fonte<\u002Fth><th>Uso<\u002Fth><th>Pesos<\u002Fth><\u002Ftr><\u002Fthead>\n        <tbody>\n          <tr><td><strong>Cormorant Garamond<\u002Fstrong><\u002Ftd><td>Headlines, logomarca, lede, monograma<\u002Ftd><td>400, 500, 600, 500i<\u002Ftd><\u002Ftr>\n          <tr><td><strong>Hanken Grotesk<\u002Fstrong><\u002Ftd><td>Labels, escopo, rodapé, CTA<\u002Ftd><td>400, 500, 600, 700<\u002Ftd><\u002Ftr>\n          <tr><td><strong>JetBrains Mono<\u002Fstrong><\u002Ftd><td>Telefone, tags técnicas<\u002Ftd><td>400, 500<\u002Ftd><\u002Ftr>\n        <\u002Ftbody>\n      <\u002Ftable>\n    <\u002Fdiv>\n    <pre><code>&lt;link href=\"https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500\n  &amp;family=Hanken+Grotesk:wght@400;500;600;700\n  &amp;family=JetBrains+Mono:wght@400;500&amp;display=swap\" rel=\"stylesheet\" /&gt;<\u002Fcode><\u002Fpre>\n  <\u002Fsection>\n\n  <!-- 3. Logomarca -->\n  <section>\n    <div class=\"section-num\">03<\u002Fdiv>\n    <h2>Logomarca — Monograma Rp<\u002Fh2>\n    <p>Direção adotada: <strong>Conceito 03 — Monograma Rp<\u002Fstrong>. Compacta, legível em qualquer tamanho, consistente com o story e a foto de perfil.<\u002Fp>\n\n    <h3>Variações<\u002Fh3>\n    <div class=\"chips-demo\">\n      <div class=\"demo-chip\">\n        <div class=\"chip-box\" style=\"background:#1c5640\">\n          <span class=\"glyph\" style=\"color:#f7f3ea\">R<span style=\"color:#d8bd86\">p<\u002Fspan><\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"label\">Verde ★<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"demo-chip\">\n        <div class=\"chip-box\" style=\"background:#bd9748\">\n          <span class=\"glyph\" style=\"color:#143c2d\">R<span style=\"color:#f7f3ea\">p<\u002Fspan><\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"label\">Ouro<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"demo-chip\">\n        <div class=\"chip-box\" style=\"background:#f7f3ea;border:1.5px solid #bd9748;box-shadow:none\">\n          <span class=\"glyph\" style=\"color:#1c5640\">R<span style=\"color:#bd9748\">p<\u002Fspan><\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"label\">Claro<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <h3>CSS do chip (usado no story)<\u002Fh3>\n    <pre><code>.rp-chip {\n  width: 124px; height: 124px; border-radius: 30px;\n  background: #1c5640;\n  display: flex; align-items: center; justify-content: center;\n  box-shadow: 0 12px 28px rgba(20,60,45,0.22);\n}\n.rp-chip .rp { font-family:\"Cormorant Garamond\",serif; font-weight:600; font-size:70px; color:#f7f3ea; }\n.rp-chip .rp .p { color:#d8bd86; }<\u002Fcode><\u002Fpre>\n  <\u002Fsection>\n\n  <!-- 4. Story -->\n  <section>\n    <div class=\"section-num\">04<\u002Fdiv>\n    <h2>Story de Anúncio (WhatsApp Status)<\u002Fh2>\n    <p><strong>Formato:<\u002Fstrong> 1080 × 1920 px, canvas fixo escalado via <code>transform: scale()<\u002Fcode> para caber em qualquer viewport.<\u002Fp>\n\n    <h3>Estrutura de layout<\u002Fh3>\n    <pre><code>┌─────────────────────────────────┐\n│  .brand  (topo fixo)            │  chip Rp + radoc.pro + DOCENTES·UFRA\n│                                 │\n│  .hero   (margin auto = centro) │  \"Faço o seu\" + RADOC + subtítulo\n│                                 │  régua + lede + escopo\n│  .cta-wrap (rodapé fixo)        │  botão WhatsApp + telefone + tagline\n└─────────────────────────────────┘\n\nElementos absolutos:\n· .watermark  \"Rp\" 483px, right:0 bottom:460px, opacidade 7%/10%\n· .frame       borda dourada dupla, inset:40px\n· .corner.*    cantos 30×30px, borda dourada 2px<\u002Fcode><\u002Fpre>\n\n    <h3>Hierarquia tipográfica<\u002Fh3>\n    <div class=\"tbl-wrap\">\n      <table>\n        <thead><tr><th>Elemento<\u002Fth><th>Fonte<\u002Fth><th>Tam.<\u002Fth><th>Cor<\u002Fth><\u002Ftr><\u002Fthead>\n        <tbody>\n          <tr><td>Chip <code>Rp<\u002Fcode><\u002Ftd><td>Cormorant 600<\u002Ftd><td>70px<\u002Ftd><td>creme + dourado-soft<\u002Ftd><\u002Ftr>\n          <tr><td><code>radoc.pro<\u002Fcode><\u002Ftd><td>Cormorant 600<\u002Ftd><td>48px<\u002Ftd><td>verde / dourado<\u002Ftd><\u002Ftr>\n          <tr><td>Eyebrow caps<\u002Ftd><td>Hanken 600<\u002Ftd><td>24px<\u002Ftd><td>verde, ls:0.34em<\u002Ftd><\u002Ftr>\n          <tr><td>Pré-headline itálico<\u002Ftd><td>Cormorant 500i<\u002Ftd><td>62px<\u002Ftd><td>ink<\u002Ftd><\u002Ftr>\n          <tr><td><strong>RADOC<\u002Fstrong><\u002Ftd><td>Cormorant 600<\u002Ftd><td>208px<\u002Ftd><td>verde<\u002Ftd><\u002Ftr>\n          <tr><td>Subtítulo caps<\u002Ftd><td>Hanken 600<\u002Ftd><td>26px<\u002Ftd><td>dourado, ls:0.34em<\u002Ftd><\u002Ftr>\n          <tr><td>Lede corpo<\u002Ftd><td>Cormorant 400<\u002Ftd><td>50px<\u002Ftd><td>ink / negrito verde<\u002Ftd><\u002Ftr>\n          <tr><td>Escopo caps<\u002Ftd><td>Hanken 600<\u002Ftd><td>22px<\u002Ftd><td>verde, ls:0.26em<\u002Ftd><\u002Ftr>\n          <tr><td>Botão CTA<\u002Ftd><td>Hanken 700<\u002Ftd><td>34px<\u002Ftd><td>creme<\u002Ftd><\u002Ftr>\n          <tr><td>Telefone<\u002Ftd><td>JetBrains Mono 500<\u002Ftd><td>30px<\u002Ftd><td>verde-deep<\u002Ftd><\u002Ftr>\n        <\u002Ftbody>\n      <\u002Ftable>\n    <\u002Fdiv>\n\n    <h3>Régua decorativa com losangos<\u002Fh3>\n    <pre><code>.rule { width:88px; height:2px; background:#bd9748; margin:46px 0; position:relative; }\n.rule::before, .rule::after {\n  content:\"\"; position:absolute; top:50%;\n  width:7px; height:7px; background:#bd9748;\n  transform:translateY(-50%) rotate(45deg); border-radius:1px;\n}\n.rule::before { left:-26px; }\n.rule::after  { right:-26px; }<\u002Fcode><\u002Fpre>\n\n    <h3>Scaling para o viewport<\u002Fh3>\n    <pre><code>(function(){\n  var stage = document.getElementById('stage');\n  function fit(){\n    var s = Math.min(window.innerWidth/1080, window.innerHeight/1920);\n    stage.style.transform = 'scale(' + s + ')';\n  }\n  window.addEventListener('resize', fit);\n  fit();\n})();<\u002Fcode><\u002Fpre>\n\n    <h3>Link WhatsApp<\u002Fh3>\n    <pre><code>&lt;a href=\"https://wa.me/5591981563432?text=Ol%C3%A1!%20Gostaria%20de%20mais%20informa%C3%A7%C3%B5es%20sobre%20o%20RADOC.\"\n   target=\"_blank\" style=\"text-decoration:none\"&gt;\n  &lt;div class=\"cta\"&gt;...&lt;/div&gt;\n&lt;/a&gt;<\u002Fcode><\u002Fpre>\n  <\u002Fsection>\n\n  <!-- 5. Foto de perfil -->\n  <section>\n    <div class=\"section-num\">05<\u002Fdiv>\n    <h2>Foto de Perfil WhatsApp<\u002Fh2>\n    <p><strong>Formato:<\u002Fstrong> 800 × 800 px, proporção 1:1. O WhatsApp recorta automaticamente em círculo.<\u002Fp>\n    <p><strong>Versão adotada ★:<\u002Fstrong> Verde Rp — máximo contraste, legível em 48px (lista de conversas).<\u002Fp>\n\n    <h3>Arte final HTML<\u002Fh3>\n    <pre><code>&lt;div style=\"\n  width:800px; height:800px; background:#1c5640;\n  border-radius:50%;\n  display:flex; align-items:center; justify-content:center;\n\"&gt;\n  &lt;span style=\"\n    font-family:'Cormorant Garamond',serif;\n    font-weight:600; font-size:420px; line-height:1; color:#f7f3ea;\n  \"&gt;R&lt;span style=\"color:#d8bd86\"&gt;p&lt;/span&gt;&lt;/span&gt;\n&lt;/div&gt;<\u002Fcode><\u002Fpre>\n\n    <h3>Tamanhos de exibição<\u002Fh3>\n    <div class=\"tbl-wrap\">\n      <table>\n        <thead><tr><th>Contexto<\u002Fth><th>Tamanho exibido<\u002Fth><\u002Ftr><\u002Fthead>\n        <tbody>\n          <tr><td>Lista de conversas<\u002Ftd><td>~48 × 48 px<\u002Ftd><\u002Ftr>\n          <tr><td>Tela de chat aberto<\u002Ftd><td>~56 × 56 px<\u002Ftd><\u002Ftr>\n          <tr><td>Perfil expandido<\u002Ftd><td>~300 × 300 px<\u002Ftd><\u002Ftr>\n          <tr><td>Arquivo original ideal<\u002Ftd><td>800 × 800 px<\u002Ftd><\u002Ftr>\n        <\u002Ftbody>\n      <\u002Ftable>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 6. Prompts -->\n  <section>\n    <div class=\"section-num\">06<\u002Fdiv>\n    <h2>Prompts prontos para Claude chat<\u002Fh2>\n\n    <h3>Recriar o story completo<\u002Fh3>\n    <div class=\"prompt-box\">\n      <div class=\"prompt-label\">Cole no Claude chat<\u002Fdiv>\n      <p>Crie um story de anúncio em HTML (1080×1920px, escalado para o viewport) para o serviço <strong>[NOME]<\u002Fstrong>.<\u002Fp>\n      <p><strong>Paleta:<\u002Fstrong> verde <code>#1c5640<\u002Fcode>, dourado <code>#bd9748<\u002Fcode>, vermelho <code>#a8392e<\u002Fcode>, creme <code>#f7f3ea<\u002Fcode>.<\u002Fp>\n      <p><strong>Fontes Google:<\u002Fstrong> Cormorant Garamond + Hanken Grotesk + JetBrains Mono.<\u002Fp>\n      <p><strong>Estrutura:<\u002Fstrong> (1) Topo: chip verde arredondado com monograma \"Rp\" + nome da marca + eyebrow em caps. (2) Centro: pré-headline itálico + headline enorme + subtítulo caps dourado + régua com losangos + parágrafo de apoio + linha de escopo. (3) Rodapé: botão pill verde com ícone WhatsApp + telefone monospace + tagline dourada.<\u002Fp>\n      <p><strong>Decoração:<\u002Fstrong> moldura de certificado (borda dupla dourada, inset 40px) + cantos quadrados + marca d'água \"Rp\" 483px no canto inferior direito (bottom:460px, opacidade baixa).<\u002Fp>\n    <\u002Fdiv>\n\n    <h3>Recriar a logomarca<\u002Fh3>\n    <div class=\"prompt-box\">\n      <div class=\"prompt-label\">Cole no Claude chat<\u002Fdiv>\n      <p>Crie uma página HTML de showcase de logomarca para <strong>radoc.pro<\u002Fstrong> com 3 variações do monograma \"Rp\" (verde, ouro e claro), cada uma em fundo claro e escuro, com simulação de ícones de app (favicon). Use Cormorant Garamond para o monograma. Paleta: verde <code>#1c5640<\u002Fcode>, dourado <code>#bd9748<\u002Fcode>, creme <code>#f7f3ea<\u002Fcode>.<\u002Fp>\n    <\u002Fdiv>\n\n    <h3>Recriar a foto de perfil<\u002Fh3>\n    <div class=\"prompt-box\">\n      <div class=\"prompt-label\">Cole no Claude chat<\u002Fdiv>\n      <p>Crie uma página HTML de escolha de foto de perfil para WhatsApp com 3 opções circulares do monograma \"Rp\" em Cormorant Garamond 600: verde (R creme, p dourado-soft), creme (R verde, p dourado), ouro (R verde-deep, p creme). Mostre cada opção como círculo grande + simulação de chat com avatar 48px + nome \"radoc.pro\".<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 7. Personalização -->\n  <section>\n    <div class=\"section-num\">07<\u002Fdiv>\n    <h2>Tabela de personalização<\u002Fh2>\n    <div class=\"tbl-wrap\">\n      <table>\n        <thead><tr><th>Campo<\u002Fth><th>Valor atual<\u002Fth><th>Onde alterar<\u002Fth><\u002Ftr><\u002Fthead>\n        <tbody>\n          <tr><td>Monograma<\u002Ftd><td><code>Rp<\u002Fcode><\u002Ftd><td><code>.rp-chip .rp<\u002Fcode>, <code>.watermark<\u002Fcode>, foto de perfil<\u002Ftd><\u002Ftr>\n          <tr><td>Nome da marca<\u002Ftd><td><code>radoc.pro<\u002Fcode><\u002Ftd><td><code>.brand-name<\u002Fcode><\u002Ftd><\u002Ftr>\n          <tr><td>Eyebrow<\u002Ftd><td><code>DOCENTES · UFRA<\u002Fcode><\u002Ftd><td><code>.eyebrow<\u002Fcode><\u002Ftd><\u002Ftr>\n          <tr><td>Headline<\u002Ftd><td><code>RADOC<\u002Fcode><\u002Ftd><td><code>.title<\u002Fcode><\u002Ftd><\u002Ftr>\n          <tr><td>Lede<\u002Ftd><td><em>ver story<\u002Fem><\u002Ftd><td><code>p.lede<\u002Fcode><\u002Ftd><\u002Ftr>\n          <tr><td>Escopo<\u002Ftd><td>Ensino · Pesquisa...<\u002Ftd><td><code>.scope<\u002Fcode><\u002Ftd><\u002Ftr>\n          <tr><td>Telefone<\u002Ftd><td><code>(91) 9 8156‑3432<\u002Fcode><\u002Ftd><td><code>.phone<\u002Fcode><\u002Ftd><\u002Ftr>\n          <tr><td>Link WhatsApp<\u002Ftd><td><code>wa.me/5591981563432<\u002Fcode><\u002Ftd><td><code>href<\u002Fcode> do <code>&lt;a&gt;<\u002Fcode><\u002Ftd><\u002Ftr>\n          <tr><td>Cor principal<\u002Ftd><td><code>#1c5640<\u002Fcode><\u002Ftd><td><code>--green<\u002Fcode> no <code>:root<\u002Fcode><\u002Ftd><\u002Ftr>\n          <tr><td>Cor dourado<\u002Ftd><td><code>#bd9748<\u002Fcode><\u002Ftd><td><code>--gold<\u002Fcode> no <code>:root<\u002Fcode><\u002Ftd><\u002Ftr>\n          <tr><td>Tamanho marca d'água<\u002Ftd><td><code>483px<\u002Fcode><\u002Ftd><td><code>.watermark { font-size }<\u002Fcode><\u002Ftd><\u002Ftr>\n          <tr><td>Posição marca d'água<\u002Ftd><td><code>right:0; bottom:460px<\u002Fcode><\u002Ftd><td><code>.watermark<\u002Fcode> position<\u002Ftd><\u002Ftr>\n        <\u002Ftbody>\n      <\u002Ftable>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 8. Notas -->\n  <section>\n    <div class=\"section-num\">08<\u002Fdiv>\n    <h2>Observações técnicas<\u002Fh2>\n    <p><strong>Safe area WhatsApp Status:<\u002Fstrong> conteúdo crítico deve ficar entre ~240px do topo e ~280px do rodapé (reserva para UI do app).<\u002Fp>\n    <p><strong><code>overflow:hidden<\u002Fcode><\u002Fstrong> no <code>#stage<\u002Fcode> garante que a marca d'água não extravase visualmente.<\u002Fp>\n    <p>O separador <code>·<\u002Fcode> do escopo é um <code>&lt;span class=\"sep\"&gt;<\u002Fcode> (círculo CSS 5×5px vermelho), não um caractere tipográfico — mantém alinhamento preciso.<\u002Fp>\n    <p>A régua usa <code>::before<\u002Fcode>/<code>::after<\u002Fcode> com <code>rotate(45deg)<\u002Fcode> para criar losangos sem SVG.<\u002Fp>\n    <p><code>text-wrap: balance<\u002Fcode> no <code>.lede<\u002Fcode> equilibra a quebra de linha automaticamente.<\u002Fp>\n    <p><code>&amp;#8209;<\u002Fcode> no telefone é o non-breaking hyphen — impede quebra indesejada entre os dígitos.<\u002Fp>\n    <p><strong>Foto de perfil:<\u002Fstrong> deve ser enviada como <strong>quadrado<\u002Fstrong> (800×800 px) — o WhatsApp faz o recorte circular automaticamente na exibição.<\u002Fp>\n  <\u002Fsection>\n\n  <div class=\"doc-footer\">\n    <div class=\"rp\">R<span>p<\u002Fspan><\u002Fdiv>\n    <p>radoc.pro · Identidade Visual · 2026<\u002Fp>\n  <\u002Fdiv>\n\n<\u002Fdiv>\n\n\n<\u002Fbody><\u002Fhtml>"
